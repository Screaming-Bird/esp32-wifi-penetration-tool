name: Build ESP32-S3 Firmware (No Bluetooth)

on:
  push:
    branches: [ main, master, no-bt, 'copilot/**' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'
      - name: CMake Configure (Dry Run)
        id: dry-run
        uses: espressif/esp-idf-ci-action@v1.2.0
        with:
          esp_idf_version: v5.0.1
          target: esp32s3
          path: '.'
          command: idf.py reconfigure
      - name: Build with ESP-IDF
        if: steps.dry-run.outcome == 'success'
        uses: espressif/esp-idf-ci-action@v1.2.0
        with:
          esp_idf_version: v5.0.1
          target: esp32s3
          path: '.'
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32s3-no-bt
          path: |
            build/*.bin
            build/*.elf
            build/bootloader/bootloader.bin
          retention-days: 30